name: Build and Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Trigger at minute 1 every hour.
    - cron: "1 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Schedule gate (PT 21:01-00:01)
        id: gate
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          pt_hour="$(TZ=America/Los_Angeles date +%H)"
          if [ "$pt_hour" = "21" ] || [ "$pt_hour" = "22" ] || [ "$pt_hour" = "23" ] || [ "$pt_hour" = "00" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skip scheduled run outside PT window: ${pt_hour}:01"
          fi

      - name: Render static page
        if: steps.gate.outputs.should_run == 'true'
        run: |
          mkdir -p site/assets/css site/assets/js
          python -m src.web.weather_page_static_render --output-html site/index.html
          cp assets/css/weather_page.css site/assets/css/weather_page.css
          cp assets/js/weather_page.js site/assets/js/weather_page.js

      - name: Configure Pages
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    if: needs.build.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
