name: Build and Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Trigger at minute 1 every hour.
    - cron: "1 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build static site
        run: |
          python -m src.cli static --output-dir site --max-workers 8 --include-all-resorts
          touch site/.nojekyll

      - name: Validate generated Pages artifact
        run: |
          python -m src.web.static_site_validator --site-dir site --require-pages-artifacts

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
