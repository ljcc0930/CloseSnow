name: Build and Deploy Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Trigger at minute 1 every hour.
    - cron: "1 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Render static page
        run: |
          mkdir -p site/assets/css site/assets/js
          python -m src.cli static --output-html site/index.html --max-workers 8
          cp assets/css/weather_page.css site/assets/css/weather_page.css
          cp assets/js/weather_page.js site/assets/js/weather_page.js

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
